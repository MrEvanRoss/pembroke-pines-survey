button:hover{background:#234ba0}button:disabled{opacity:.6;cursor:default}
.err{color:#c0362b;font-size:13px;font-weight:600;min-height:18px;margin-top:2px}

<script>
(function(){
  var SALT="WjL/8ZPN6mSOU3hGJuIDFA==", IV="HuaWnA1z6lFOHbEV", ITER=250000, STORE="pcg_gate_pw";
  function b642bytes(b){var s=atob(b),a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
  var f=document.getElementById('f'),pw=document.getElementById('pw'),btn=document.getElementById('btn'),err=document.getElementById('err');
  f.addEventListener('submit',function(e){e.preventDefault();unlock(pw.value,false);});
  var CRYPTO_OK = window.isSecureContext && window.crypto && window.crypto.subtle;
  function unlock(pass,silent){
    if(!CRYPTO_OK){   // Web Crypto is only available over https:// — never hang the button
      if(!silent){err.innerHTML='This page needs a secure connection. Please open <a href="https://'+location.host+location.pathname+'" style="color:#1c419a;font-weight:700">the https:// version</a>.';}

    var enc=new TextEncoder();

        km,{name:'AES-GCM',length:256},false,['decrypt']);

    }).then(function(buf){
      try{sessionStorage.setItem(STORE,pass);}catch(e){}          // remember for other pages this session

      if(silent){try{sessionStorage.removeItem(STORE);}catch(e){} return;}   // bad saved pw: just show the form
      btn.disabled=false;btn.textContent='Unlock';err.textContent='Incorrect password. Please try again.';
      pw.value='';pw.focus();
    });
